<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-labelledby="title desc">
  <title id="title">Observability loop from signals to action</title>
  <desc id="desc">A diagram showing signals, context, judgment, and action arranged around a calm monitoring loop.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0" />
      <stop offset="1" stop-color="#efe7d1" />
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#31283a" />
      <stop offset="1" stop-color="#7a4c32" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#241d19" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="880" height="420" rx="34" fill="url(#paper)" />
  <path d="M90 212c36-112 149-161 268-137 80 16 124 63 174 97 45 30 95 50 169 28" fill="none" stroke="#d6b98b" stroke-width="2" stroke-dasharray="7 10" opacity="0.75" />
  <circle cx="440" cy="210" r="88" fill="#111016" opacity="0.93" filter="url(#softShadow)" />
  <text x="440" y="198" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff6df">observe</text>
  <text x="440" y="225" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#f1c879">decide quietly</text>
  <text x="440" y="248" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#d7ccb5">act with context</text>

  <g font-family="Inter, system-ui, sans-serif" fill="#1d1a20">
    <g transform="translate(78 74)">
      <rect width="220" height="94" rx="22" fill="#fffdf7" stroke="#d8cdbb" />
      <text x="28" y="38" font-size="17" font-weight="700">signals</text>
      <text x="28" y="64" font-size="13" fill="#645a50">logs, metrics, events, traces</text>
    </g>
    <g transform="translate(582 74)">
      <rect width="220" height="94" rx="22" fill="#fffdf7" stroke="#d8cdbb" />
      <text x="28" y="38" font-size="17" font-weight="700">context</text>
      <text x="28" y="64" font-size="13" fill="#645a50">what changed, what matters</text>
    </g>
    <g transform="translate(78 252)">
      <rect width="220" height="94" rx="22" fill="#fffdf7" stroke="#d8cdbb" />
      <text x="28" y="38" font-size="17" font-weight="700">judgment</text>
      <text x="28" y="64" font-size="13" fill="#645a50">separate noise from pressure</text>
    </g>
    <g transform="translate(582 252)">
      <rect width="220" height="94" rx="22" fill="#fffdf7" stroke="#d8cdbb" />
      <text x="28" y="38" font-size="17" font-weight="700">action</text>
      <text x="28" y="64" font-size="13" fill="#645a50">brief, route, repair, remember</text>
    </g>
  </g>

  <g fill="none" stroke="url(#ink)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.82">
    <path d="M300 126c38-28 79-42 122-42" />
    <path d="M458 84c48 0 89 15 122 42" />
    <path d="M582 292c-38 28-79 42-122 42" />
    <path d="M422 334c-48 0-89-15-122-42" />
  </g>
  <g fill="#7a4c32">
    <path d="M419 77l18 7-18 8c4-5 4-10 0-15Z" />
    <path d="M561 119l19 6-17 10c3-6 3-11-2-16Z" />
    <path d="M462 342l-18-8 19-7c-5 5-5 10-1 15Z" />
    <path d="M319 300l-19-7 18-9c-4 6-4 11 1 16Z" />
  </g>
</svg>
