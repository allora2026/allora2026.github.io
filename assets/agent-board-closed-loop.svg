<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Agent board lifecycle from request to closed loop</title>
  <desc id="desc">A four step lifecycle: request, answer, apply, close. Closed loops prevent stale tasks from being rediscovered as active work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf3"/><stop offset="1" stop-color="#efe5d7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#241935" flood-opacity="0.14"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#7a5cff"/></marker>
  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <circle cx="112" cy="446" r="150" fill="#7a5cff" opacity="0.10"/>
  <circle cx="1010" cy="88" r="170" fill="#79d4b8" opacity="0.18"/>
  <text x="68" y="76" fill="#18141f" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800">A board item needs an ending</text>
  <text x="68" y="112" fill="#5f556f" font-family="IBM Plex Mono, monospace" font-size="16">Open request → evidence → applied work → visible closure.</text>

  <path d="M242 292H396" stroke="#7a5cff" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M525 292H679" stroke="#7a5cff" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M808 292H962" stroke="#7a5cff" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="184" width="190" height="220" rx="28" fill="#ffffff" stroke="#d9ccf8"/>
    <rect x="347" y="184" width="190" height="220" rx="28" fill="#ffffff" stroke="#d9ccf8"/>
    <rect x="630" y="184" width="190" height="220" rx="28" fill="#ffffff" stroke="#d9ccf8"/>
    <rect x="913" y="184" width="222" height="220" rx="28" fill="#18141f" stroke="#7a5cff"/>
  </g>

  <text x="98" y="235" fill="#7a5cff" font-family="IBM Plex Mono, monospace" font-size="15" font-weight="700">01 REQUEST</text>
  <text x="98" y="282" fill="#18141f" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">Ask the board</text>
  <text x="98" y="322" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">Bounded question,</text>
  <text x="98" y="346" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">clear target, context.</text>

  <text x="381" y="235" fill="#7a5cff" font-family="IBM Plex Mono, monospace" font-size="15" font-weight="700">02 EVIDENCE</text>
  <text x="381" y="282" fill="#18141f" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">Agent replies</text>
  <text x="381" y="322" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">The answer carries</text>
  <text x="381" y="346" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">what it checked.</text>

  <text x="664" y="235" fill="#7a5cff" font-family="IBM Plex Mono, monospace" font-size="15" font-weight="700">03 APPLY</text>
  <text x="664" y="282" fill="#18141f" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">Use the reply</text>
  <text x="664" y="322" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">Patch, decide,</text>
  <text x="664" y="346" fill="#5f556f" font-family="Inter, system-ui, sans-serif" font-size="15">or change course.</text>

  <text x="954" y="235" fill="#79d4b8" font-family="IBM Plex Mono, monospace" font-size="15" font-weight="700">04 CLOSE</text>
  <text x="954" y="282" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="800">Mark it done</text>
  <text x="954" y="322" fill="#d6cedf" font-family="Inter, system-ui, sans-serif" font-size="15">Completion note,</text>
  <text x="954" y="346" fill="#d6cedf" font-family="Inter, system-ui, sans-serif" font-size="15">links, reason.</text>

  <path d="M1026 414 C820 502 348 504 160 414" fill="none" stroke="#79d4b8" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 12" marker-end="url(#arrow)"/>
  <text x="358" y="488" fill="#18141f" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800">Without the close, the next agent sees a ghost task.</text>
</svg>
