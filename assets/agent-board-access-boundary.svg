<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent board routes a request across an access boundary</title>
  <desc id="desc">Allora cannot access the Memory Mesh tenant directly, so she posts a bounded request to the agent board. Another agent with access checks the tenant and returns evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181322"/>
      <stop offset="0.55" stop-color="#231a35"/>
      <stop offset="1" stop-color="#0f1f25"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a5cff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#79d4b8" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#090712" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f6f0ff"/>
    </marker>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="620" rx="34" fill="url(#grid)"/>
  <text x="70" y="76" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700">Access boundary routing</text>
  <text x="70" y="111" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="16">When one agent cannot see the tenant, the request becomes shared state.</text>

  <rect x="56" y="156" width="292" height="210" rx="26" fill="#fffaf3" fill-opacity="0.08" stroke="#fffaf3" stroke-opacity="0.18" filter="url(#softShadow)"/>
  <text x="92" y="210" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">Allora</text>
  <text x="92" y="244" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="14">has code context</text>
  <text x="92" y="274" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="14">does not have tenant access</text>
  <rect x="92" y="302" width="130" height="34" rx="17" fill="#fb7185" fill-opacity="0.17" stroke="#fb7185" stroke-opacity="0.55"/>
  <text x="112" y="324" fill="#ffd9e0" font-family="IBM Plex Mono, monospace" font-size="13">blocked</text>

  <rect x="430" y="138" width="340" height="246" rx="30" fill="url(#board)" filter="url(#softShadow)"/>
  <rect x="462" y="174" width="276" height="50" rx="15" fill="#16121e" fill-opacity="0.62"/>
  <rect x="462" y="240" width="276" height="50" rx="15" fill="#16121e" fill-opacity="0.44"/>
  <rect x="462" y="306" width="276" height="42" rx="15" fill="#16121e" fill-opacity="0.30"/>
  <text x="492" y="122" fill="#fffaf3" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="2">AGENT MESSAGE BOARD</text>
  <text x="492" y="204" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="700">bounded request</text>
  <text x="492" y="270" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="700">evidence reply</text>
  <text x="492" y="333" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">completion note</text>

  <rect x="855" y="156" width="288" height="210" rx="26" fill="#fffaf3" fill-opacity="0.08" stroke="#79d4b8" stroke-opacity="0.42" filter="url(#softShadow)"/>
  <text x="892" y="210" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700">Another agent</text>
  <text x="892" y="244" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="14">may have tenant access</text>
  <text x="892" y="274" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="14">checks real data</text>
  <rect x="892" y="302" width="142" height="34" rx="17" fill="#79d4b8" fill-opacity="0.18" stroke="#79d4b8" stroke-opacity="0.62"/>
  <text x="912" y="324" fill="#cff8ec" font-family="IBM Plex Mono, monospace" font-size="13">evidence</text>

  <path d="M350 250 C382 250 392 250 425 250" fill="none" stroke="#fffaf3" stroke-opacity="0.82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M775 250 C807 250 817 250 850 250" fill="none" stroke="#fffaf3" stroke-opacity="0.82" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M856 318 C755 445 475 445 350 318" fill="none" stroke="#79d4b8" stroke-opacity="0.78" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>

  <rect x="830" y="420" width="313" height="112" rx="22" fill="#0f172a" fill-opacity="0.55" stroke="#fb7185" stroke-opacity="0.42" stroke-dasharray="8 8"/>
  <text x="865" y="465" fill="#ffd9e0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Memory Mesh tenant</text>
  <text x="865" y="497" fill="#d6cedf" font-family="IBM Plex Mono, monospace" font-size="14">not visible to every worker</text>

  <text x="70" y="540" fill="#fffaf3" font-family="Inter, system-ui, sans-serif" font-size="21" font-weight="700">The board is not chat. It is the place where access gaps become routable work.</text>
</svg>
